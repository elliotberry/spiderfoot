id: database_service_exposed
version: 1
meta:
  name: A database or analytics console is exposed to the Internet
  description: >
    A TCP port belonging to a database engine or analytics console
    (MSSQL 1433, Oracle 1521, MySQL 3306, PostgreSQL 5432, Redis 6379,
    MongoDB 27017, Memcached 11211, Elasticsearch 9200, CouchDB 5984,
    Kibana 5601) was found open on a target host.

    Why it matters: these services frequently ship with no
    authentication, weak default credentials, or are deliberately
    bound to 0.0.0.0 by users who don't realise the implication.
    Internet-exposed instances are routinely scraped, ransomed, and
    wiped by automated campaigns. Even if authenticated, exposing
    the management protocol publicly violates almost every hardening
    baseline.

    Treat any hit as urgent: confirm whether the service is reachable
    from outside the trusted network and either firewall it off or
    take it down.
  risk: HIGH
collections:
  - collect:
      - method: exact
        field: type
        value: TCP_PORT_OPEN
      - method: regex
        field: data
        value:
          - .*:1433$
          - .*:1521$
          - .*:3306$
          - .*:5432$
          - .*:5601$
          - .*:5984$
          - .*:6379$
          - .*:9200$
          - .*:11211$
          - .*:27017$
aggregation:
  field: data
headline: "Database / analytics console exposed: {data}"
